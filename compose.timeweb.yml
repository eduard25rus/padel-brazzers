services:
  web:
    image: ${PB_IMAGE:?PB_IMAGE must point to an exact release image}
    container_name: padel-brazzers-web
    restart: unless-stopped
    init: true
    environment:
      DATA_DIR: /data
      PORT: "8080"
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-}
      REQUIRE_EXISTING_STORE: "true"
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-}
    ports:
      - "127.0.0.1:8003:8080"
    volumes:
      - /srv/padel-brazzers/data:/data
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
